version: '3'

vars:
  CARGO_ARGS: ''

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  check:
    desc: Run cargo check on workspace
    cmds:
      - cargo check --workspace {{.CARGO_ARGS}}

  build:
    desc: Build all workspace members
    cmds:
      - cargo build --workspace {{.CARGO_ARGS}}

  test:
    desc: Run all tests
    cmds:
      - cargo nextest run --workspace {{.CARGO_ARGS}}

  lint:
    desc: Run clippy with strict warnings
    cmds:
      - cargo clippy --workspace -- -D warnings

  fmt:
    desc: Format all code
    cmds:
      - cargo fmt --all

  fmt-check:
    desc: Check formatting
    cmds:
      - cargo fmt --all -- --check

  gateway:
    desc: Run the gateway service
    cmds:
      - cargo run -p talon-gateway {{.CARGO_ARGS}}

  proto:
    desc: Compile protobuf definitions
    cmds:
      - cargo build -p talon-channel-sdk

  clean:
    desc: Clean build artifacts
    cmds:
      - cargo clean

  ci:
    desc: Run full CI pipeline
    cmds:
      - task: fmt-check
      - task: lint
      - task: test

  # ── Docker ──────────────────────────────────────────────────────────────

  docker-build:
    desc: Build all Docker images
    cmds:
      - docker compose build

  docker-up:
    desc: Start the Docker Compose development stack
    cmds:
      - docker compose up -d
      - echo "Services starting... gateway=8080 web=8081 admin=8082 surrealdb=8000"

  docker-down:
    desc: Stop the Docker Compose stack
    cmds:
      - docker compose down

  docker-logs:
    desc: Follow logs from the Docker Compose stack
    cmds:
      - docker compose logs -f
