{% extends "base.html" %}

{% block title %}New Agent - Talon Admin{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="/v1/tenants/{{ tenant_id }}/agents" class="text-blue-600 hover:underline text-sm">&larr; Back to agents</a>
</div>

<div class="bg-white rounded-lg shadow p-6 max-w-lg">
    <h2 class="text-2xl font-bold mb-2">Create Agent</h2>
    <p class="text-gray-500 text-sm mb-6">Tenant: {{ tenant_name }}</p>

    <form method="POST" action="/v1/tenants/{{ tenant_id }}/agents" class="space-y-4">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" id="name" name="name" required
                   class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2 border">
        </div>

        <div>
            <label for="system_prompt" class="block text-sm font-medium text-gray-700">System Prompt</label>
            <textarea id="system_prompt" name="system_prompt" rows="3"
                      class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2 border"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="provider" class="block text-sm font-medium text-gray-700">Provider</label>
                <input type="text" id="provider" name="provider" value="ollama"
                       class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2 border">
            </div>
            <div>
                <label for="model" class="block text-sm font-medium text-gray-700">Model</label>
                <input type="text" id="model" name="model" value="llama3.2"
                       class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2 border">
            </div>
        </div>

        <div>
            <label for="trust_tier" class="block text-sm font-medium text-gray-700">Trust Tier</label>
            <select id="trust_tier" name="trust_tier"
                    class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2 border">
                <option value="untrusted" selected>Untrusted</option>
                <option value="basic">Basic</option>
                <option value="standard">Standard</option>
                <option value="elevated">Elevated</option>
                <option value="full">Full</option>
            </select>
        </div>

        <div class="pt-4">
            <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition-colors">
                Create Agent
            </button>
        </div>
    </form>
</div>
{% endblock %}
