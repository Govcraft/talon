{% extends "base.html" %}

{% block title %}Dashboard - Talon Admin{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Dashboard</h2>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-gray-500 text-sm font-medium uppercase tracking-wide">Tenants</h3>
        <p class="mt-2 text-3xl font-semibold text-gray-900">{{ tenant_count }}</p>
        <a href="/v1/tenants" class="mt-4 inline-block text-sm text-blue-600 hover:underline">
            View all tenants
        </a>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-gray-500 text-sm font-medium uppercase tracking-wide">Sessions</h3>
        <p class="mt-2 text-3xl font-semibold text-gray-900">{{ session_count }}</p>
        <a href="/v1/sessions" class="mt-4 inline-block text-sm text-blue-600 hover:underline">
            View all sessions
        </a>
    </div>
</div>
{% endblock %}
