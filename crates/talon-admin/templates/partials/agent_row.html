<tr>
    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ agent.name }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ agent.provider }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ agent.model }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ agent.trust_tier }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{% if agent.is_default %}Yes{% else %}No{% endif %}</td>
    <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
        <button hx-post="/v1/tenants/{{ tenant_id }}/agents/{{ agent.id }}/delete"
                hx-confirm="Delete agent '{{ agent.name }}'? This cannot be undone."
                hx-target="closest tr"
                hx-swap="outerHTML"
                class="text-red-600 hover:underline">
            Delete
        </button>
    </td>
</tr>
