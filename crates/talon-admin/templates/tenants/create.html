{% extends "base.html" %}

{% block title %}New Tenant - Talon Admin{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="/v1/tenants" class="text-blue-600 hover:underline text-sm">&larr; Back to tenants</a>
</div>

<div class="bg-white rounded-lg shadow p-6 max-w-lg">
    <h2 class="text-2xl font-bold mb-6">Create Tenant</h2>

    <form method="POST" action="/v1/tenants" class="space-y-4">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" id="name" name="name" required
                   class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2 border">
        </div>

        <div>
            <label for="slug" class="block text-sm font-medium text-gray-700">Slug</label>
            <input type="text" id="slug" name="slug" required
                   pattern="[a-z0-9\-]+"
                   title="Lowercase letters, digits, and hyphens only"
                   class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2 border">
            <p class="mt-1 text-xs text-gray-500">Lowercase letters, digits, and hyphens only.</p>
        </div>

        <div>
            <label for="plan" class="block text-sm font-medium text-gray-700">Plan</label>
            <select id="plan" name="plan"
                    class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2 border">
                <option value="free" selected>Free</option>
                <option value="pro">Pro</option>
                <option value="enterprise">Enterprise</option>
            </select>
        </div>

        <div class="pt-4">
            <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition-colors">
                Create Tenant
            </button>
        </div>
    </form>
</div>
{% endblock %}
